name: next-v2-homologation

on:
  pull_request:
    branches: [homologation]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'scripts/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'Dockerfile'
      - '.github/workflows/bff-homologation.yml'
  push:
    branches: [homologation]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'scripts/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'Dockerfile'
      - '.github/workflows/bff-homologation.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  packages: write
  security-events: write

concurrency:
  group: next-v2-homologation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  next_hml:
    permissions:
      contents: write
      actions: read
      packages: write
      security-events: write
    uses: aviait/deploy-templates/.github/workflows/v2-bff.yml@main
    with:
      app_name: ${{ vars.APP_NAME }}
      runner_label: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
      environment: ${{ vars.PIPELINE_ENV_HML || 'hml' }}
      working_directory: '.'
      node_version: ${{ vars.NODE_VERSION || '22' }}
      package_manager: npm
      cache_dependency_path: package-lock.json
      lint_cmd: npm run lint && npm run format:check
      typecheck_cmd: npm run typecheck
      test_cmd: ${{ vars.TEST_CMD || 'echo "sem testes unitarios"' }}
      migration_cmd: ${{ vars.MIGRATION_CMD || 'npm run db:migrate' }}
      dockerfile: ${{ vars.DOCKERFILE || 'Dockerfile' }}
      registry: ${{ vars.REGISTRY }}
      image_namespace: ${{ vars.IMAGE_NAMESPACE }}
      image_name: ${{ vars.IMAGE_NAME }}
      semver_prefix: ${{ vars.PIPELINE_SEMVER_PREFIX || 'v' }}
      enable_release: false
      deploy_on_tag_only: false
      inject_all_git_vars: ${{ vars.INJECT_ALL_GIT_VARS != 'false' }}
      git_vars_exclude: ${{ vars.GIT_VARS_EXCLUDE }}
      dns_name: ${{ vars.DNS_NAME_HML || vars.DNS_NAME }}
      container_port: ${{ fromJSON(vars.CONTAINER_PORT || '80') }}
      healthcheck_path: /api/health
      traefik_network: ${{ vars.TRAEFIK_NETWORK || 'traefik-public' }}
      traefik_cert_resolver: ${{ vars.TRAEFIK_CERT_RESOLVER || 'le' }}
      traefik_middlewares: ${{ vars.TRAEFIK_MIDDLEWARES || 'security-headers@file,rate-limit-default@file,compress@file' }}
      kuma_interval: ${{ fromJSON(vars.KUMA_INTERVAL || '60') }}
      kuma_max_retries: ${{ fromJSON(vars.KUMA_MAX_RETRIES || '2') }}
      kuma_accepted_statuscodes: ${{ vars.KUMA_ACCEPTED_STATUSCODES || '["200-299"]' }}
      use_tailscale: ${{ vars.USE_TAILSCALE == 'true' }}
    secrets:
      TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
      CHECKOUT_TOKEN: ${{ secrets.CHECKOUT_TOKEN }}
      GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
      PEM_KEY: ${{ secrets.PEM_KEY_HML || secrets.PEM_KEY }}
      DEPLOY_REGISTRY_USERNAME: ${{ secrets.DEPLOY_REGISTRY_USERNAME }}
      DEPLOY_REGISTRY_PASSWORD: ${{ secrets.DEPLOY_REGISTRY_PASSWORD }}
      DOCKER_RUN_ENVS_FILE: ${{ secrets.DOCKER_RUN_ENVS_FILE_HML || secrets.DOCKER_RUN_ENVS_FILE }}
